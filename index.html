<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 工具导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .nav-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 40px 50px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            text-align: center;
            min-width: 200px;
        }

        .nav-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .nav-card .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .nav-card .title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .nav-card .desc {
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>🛠️ Demo 工具导航</h1>
    <div class="nav-container">
        <a href="calendar.html" class="nav-card">
            <div class="icon">📅</div>
            <div class="title">万年历</div>
            <div class="desc">查看日历、节气、星座</div>
        </a>
        <a href="image-sorter.html" class="nav-card">
            <div class="icon">🖼️</div>
            <div class="title">图片排序</div>
            <div class="desc">图片排序支持导出</div>
        </a>
    </div>
</body>
</html>
